name: Security Scan
on:
  workflow_dispatch:
  push:
    branches: [ main, noel ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    name: Build Node Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci || npm install
      - name: Zip application
        run: zip -r analysisPack.zip . -x "*.git*"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app-artifact
          path: analysisPack.zip
          retention-days: 1
  security:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app-artifact
      - name: Run Veracode Scan
        uses: Afrika-Tecnologia/Veracode-Connect@v1.1
        with:
          scan_file: 'analysisPack.zip'
          veracode_api_id: ${{ secrets.VERACODE_API_ID }}
          veracode_api_key: ${{ secrets.VERACODE_API_KEY }}
          enable_auto_packager: 'false'
          enable_baseline: 'false'
          enable_upload_scan: 'true'
          veracode_sandbox: 'false'
          policy_fail: 'true'
          enable_sca: 'true'
          veracode_sca_token: ${{ secrets.VERACODE_SCA_TOKEN }}
