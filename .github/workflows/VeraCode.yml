name: Security Scan (Auto packager + Bantuu baseline)

on:
  workflow_dispatch:
  push:
    branches: [ main, noel ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Node Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Zip application
        run: zip -r analysisPack.zip . -x "*.git*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app-artifact
          path: analysisPack.zip
          retention-days: 1

  security:
    needs: build
    uses: # Referencie para o ci_security_scans do Cogna Core
    with:
      runner: ubuntu-latest
      build_artifact_name: 'node-app-artifact'
      build_artifact_path: 'build'
    secrets:
      SCAN_API_TOKEN: ${{ secrets.VERACODE_SCA_TOKEN }}
      SCAN_API_ID: ${{ secrets.VERACODE_API_ID }}
      SCAN_API_KEY: ${{ secrets.VERACODE_API_KEY }}
      BANTUU_API_KEY: ${{ secrets.BANTUU_API_KEY }}
